<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF 注释示例</title>
    <!-- Mirador -->
    <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/mirador.min.css">
    <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #mirador-viewer {
            flex-grow: 1;
            position: relative;
        }
        .description {
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>IIIF 注释示例</h1>
        </div>
        <div class="description">
            <h2>两种注释方式的演示</h2>
            <p>左侧窗口展示嵌入式注释（Embedded Annotations），右侧窗口展示引用式注释（Referenced Annotations）。</p>
        </div>
        <div id="mirador-viewer"></div>
    </div>

    <script type="text/javascript">
        const miradorInstance = Mirador.viewer({
            id: 'mirador-viewer',
            window: {
                allowClose: false,
                allowMaximize: false,
                defaultSideBarPanel: 'annotations',
                sideBarOpenByDefault: true,
            },
            workspace: {
                type: 'mosaic',
                showZoomControls: true,
            },
            windows: [
                {
                    manifestId: 'https://oushiei120.github.io/iiif/manifest-embedded.json',
                    thumbnailNavigationPosition: 'far-bottom'
                },
                {
                    manifestId: 'https://oushiei120.github.io/iiif/manifest-referenced.json',
                    thumbnailNavigationPosition: 'far-bottom'
                }
            ],
            theme: {
                palette: {
                    primary: {
                        main: '#1967d2'
                    }
                }
            }
        });
    </script>
</body>
</html>
