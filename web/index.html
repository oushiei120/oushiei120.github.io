<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF 注释示例</title>
    
    <!-- Mirador -->
    <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/mirador.min.css">
    <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .container {
            display: flex;
            position: absolute;
            top: 80px;
            bottom: 0;
            width: 100%;
        }
        #viewer {
            flex: 7;
            height: 100%;
        }
        #annotations-panel {
            flex: 3;
            padding: 20px;
            overflow-y: auto;
            background-color: #f8f9fa;
            border-left: 1px solid #ddd;
        }
        .annotation-item {
            margin-bottom: 15px;
            padding: 10px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .annotation-link {
            color: #007bff;
            text-decoration: underline;
            cursor: pointer;
            margin-bottom: 5px;
            display: block;
        }
        .annotation-text {
            margin-top: 5px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>IIIF 注释示例 v1.7</h1>
    </div>
    <div class="container">
        <div id="viewer"></div>
        <div id="annotations-panel"></div>
    </div>

    <script type="text/javascript">
        var mirador = Mirador.viewer({
            id: "viewer",
            windows: [
                {
                    manifestId: 'https://oushiei120.github.io/iiif/manifest-referenced.json',
                    allowClose: true,
                    allowFullscreen: true,
                    allowMaximize: true,
                    defaultView: 'single',
                    defaultSideBarPanel: 'annotations',
                }
            ]
        });

        // 加载并显示注释列表
        async function loadAnnotations() {
            try {
                const response = await fetch('https://oushiei120.github.io/iiif/annotation1.json');
                const data = await response.json();
                const annotationsPanel = document.getElementById('annotations-panel');
                
                data.items.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'annotation-item';
                    
                    const link = document.createElement('a');
                    link.className = 'annotation-link';
                    link.textContent = `注释 ${index + 1}`;
                    link.onclick = () => {
                        // 获取注释的位置信息
                        const xywh = item.target.selector.value;
                        const [x, y, w, h] = xywh.split('=')[1].split(',').map(Number);
                        
                        // 通过 Mirador 的 actions 跳转到对应位置
                        // 注：这里需要等待 Mirador 完全加载
                        setTimeout(() => {
                            const windows = mirador.store.getState().windows;
                            const windowId = Object.keys(windows)[0];
                            mirador.store.dispatch({
                                type: 'SET_CANVAS',
                                windowId: windowId,
                                canvasId: item.target.source
                            });
                        }, 100);
                    };
                    
                    const text = document.createElement('div');
                    text.className = 'annotation-text';
                    text.textContent = item.body.value;
                    
                    div.appendChild(link);
                    div.appendChild(text);
                    annotationsPanel.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading annotations:', error);
            }
        }

        // 页面加载完成后加载注释
        window.addEventListener('load', loadAnnotations);
    </script>
</body>
</html>
