<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF 注释示例</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .header {
            background-color: #f8f9fa;
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
        #uv {
            width: 100%;
            height: calc(100vh - 100px);
        }
    </style>
    <script type="text/javascript" src="https://universalviewer.io/umd/UV.js"></script>
</head>
<body>
    <div class="header">
        <h1>IIIF 注释示例 v1.6</h1>
    </div>
    <div id="uv"></div>

    <script type="text/javascript">
        window.addEventListener('uvLoaded', function(e) { 
            createUV('#uv', {
                manifest: 'https://oushiei120.github.io/iiif/manifest-referenced.json'
            }, new UV.URLDataProvider());
        }, false);
    </script>
</body>
</html>
