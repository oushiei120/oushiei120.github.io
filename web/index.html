<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF Mirador Viewer</title>
    
    <!-- Mirador -->
    <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/mirador.min.css">
    <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        #viewer {
            flex: 1;
            height: 100%;
        }
        #text-panel {
            width: 400px;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            border-left: 1px solid #ccc;
            font-family: sans-serif;
            line-height: 1.6;
        }
        .text-content {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }
        .jump-marker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 10px;
            background-color: #007bff;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .jump-marker:hover {
            background-color: #0056b3;
        }
        .text-block {
            flex: 1;
            cursor: pointer;
        }
        .text-block:hover {
            color: #007bff;
        }
        .page-number {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="text-panel">
        <div class="text-content">
            <a href="#" class="jump-marker" data-canvas="p1">➜</a>
            <div class="text-block" data-canvas="p1">
                <div class="page-number">p.212</div>
                追憶の伊藤激平先生(中野)
            </div>
        </div>
        <div class="text-content">
            <a href="#" class="jump-marker" data-canvas="p2">➜</a>
            <div class="text-block" data-canvas="p2">
                <div class="page-number">p.214</div>
                昭和二十年四月、東京帝國大學文學部支那哲文學科に入學される
            </div>
        </div>
        <div class="text-content">
            <a href="#" class="jump-marker" data-canvas="p3">➜</a>
            <div class="text-block" data-canvas="p3">
                <div class="page-number">p.216</div>
                昨年十二月、入院中だった先生のご容態が悪化された際、「キュ
            </div>
        </div>
    </div>

    <script type="text/javascript">
        var mirador = Mirador.viewer({
            id: "viewer",
            windows: [{
                manifestId: 'https://example.com/iiif/manifests/book1.json'
            }],
            window: {
                allowFullscreen: true,
                sideBarOpenByDefault: false
            }
        });

        // 存储Mirador window ID
        let windowId = null;

        // 监听Mirador窗口创建事件
        mirador.store.subscribe(() => {
            const state = mirador.store.getState();
            if (!windowId) {
                // 获取第一个窗口的ID
                windowId = Object.keys(state.windows)[0];
            }
        });

        // 跳转到指定页面的函数
        function jumpToCanvas(canvasIndex) {
            if (windowId) {
                mirador.store.dispatch({
                    type: 'SET_CANVAS',
                    windowId: windowId,
                    canvasId: `https://oushiei120.github.io/iiif/manifests/book1/canvas/${canvasIndex}`
                });
            }
        }

        // 为所有可点击元素添加事件监听器
        document.querySelectorAll('.jump-marker, .text-block').forEach(element => {
            element.addEventListener('click', (e) => {
                e.preventDefault();
                const canvasId = element.getAttribute('data-canvas');
                jumpToCanvas(canvasId);
            });
        });
    </script>
</body>
</html>
