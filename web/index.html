<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF Mirador Viewer</title>
    
    <!-- Mirador -->
    <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/mirador.min.css">
    <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
    
    <style>
        #viewer {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="text/javascript">
        var mirador = Mirador.viewer({
            id: "viewer",
            windows: [{
                manifestId: 'https://oushiei120.github.io/iiif/manifests/manifest.json',
                allowClose: true,
                allowFullscreen: true,
                allowMaximize: true,
                defaultView: 'single',
            }],
            window: {
                allowClose: true,
                allowFullscreen: true,
                allowMaximize: true,
                sideBarOpen: true,
                defaultSideBarPanel: 'info',
                views: [
                    { key: 'single' },
                    { key: 'book' },
                    { key: 'gallery' }
                ],
            },
            workspace: {
                type: 'mosaic',
                showZoomControls: true,
            },
            workspaceControlPanel: {
                enabled: true,
            },
            theme: {
                palette: {
                    primary: {
                        main: '#1967d2'
                    }
                }
            }
        });
    </script>
</body>
</html>
