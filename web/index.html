<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF 注释示例</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .header {
            background-color: #f8f9fa;
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
        #uv {
            width: 100%;
            height: calc(100vh - 100px);
            background-color: #000;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/universalviewer@3.1.1/dist/uv.css">
    <script src="https://cdn.jsdelivr.net/npm/universalviewer@3.1.1/dist/uv.js"></script>
</head>
<body>
    <div class="header">
        <h1>IIIF 注释示例 v1.6</h1>
    </div>
    <div id="uv" class="uv"></div>
    <script>
        var myUV = UV.init('uv', {
            root: '.',
            iiifResourceUri: 'https://oushiei120.github.io/iiif/manifest-referenced.json',
            configUri: 'https://cdn.jsdelivr.net/npm/universalviewer@3.1.1/dist/uv-config.json',
            canvasIndex: 0,
            embedded: true,
            rotation: 0,
            locales: [{
                name: 'ja-JP',
                label: '日本語'
            }]
        });
    </script>
</body>
</html>
