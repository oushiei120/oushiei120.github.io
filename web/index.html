<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF 注释示例</title>
    
    <!-- Mirador -->
    <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/mirador.min.css">
    <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        #search-container {
            margin: 10px;
            padding: 10px;
            text-align: center;
        }
        #search-input {
            width: 300px;
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #search-button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #search-button:hover {
            background-color: #0056b3;
        }
        #search-results {
            margin: 10px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: none;
        }
        #viewer {
            position: absolute;
            top: 200px;
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>IIIF 注释示例 v1.7</h1>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="搜索注释内容...">
            <button id="search-button">搜索</button>
        </div>
        <div id="search-results"></div>
    </div>
    <div id="viewer"></div>

    <script type="text/javascript">
        var mirador = Mirador.viewer({
            id: "viewer",
            windows: [
                {
                    manifestId: 'https://oushiei120.github.io/iiif/manifest-referenced.json',
                    allowClose: true,
                    allowFullscreen: true,
                    allowMaximize: true,
                    defaultView: 'single',
                    defaultSideBarPanel: 'annotations',
                    sideBarOpenByDefault: true,
                    annotations: {
                        visible: true,
                        displayAll: true
                    }
                }
            ],
            window: {
                allowClose: false,
                allowFullscreen: true,
                allowMaximize: true,
                sideBarOpen: true,
                defaultSideBarPanel: 'annotations',
                views: [
                    { key: 'single' }
                ],
                annotations: {
                    visible: true,
                    displayAll: true
                }
            },
            workspace: {
                type: 'mosaic',
                showZoomControls: true,
            },
            workspaceControlPanel: {
                enabled: true,
            },
            theme: {
                palette: {
                    primary: {
                        main: '#1967d2'
                    }
                }
            }
        });

        // 添加搜索功能
        document.getElementById('search-button').addEventListener('click', searchAnnotations);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchAnnotations();
            }
        });

        async function searchAnnotations() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            
            if (!searchText) {
                resultsDiv.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('https://oushiei120.github.io/iiif/annotation1.json');
                const data = await response.json();
                
                const results = data.items.filter(item => 
                    item.body.value.toLowerCase().includes(searchText)
                );

                resultsDiv.innerHTML = '';
                if (results.length > 0) {
                    results.forEach(result => {
                        const div = document.createElement('div');
                        div.style.padding = '10px';
                        div.style.borderBottom = '1px solid #eee';
                        div.textContent = result.body.value;
                        div.style.cursor = 'pointer';
                        div.onclick = () => {
                            // 点击结果时高亮对应的注释
                            const canvasId = result.target.source;
                            const xywh = result.target.selector.value;
                            // 可以在这里添加高亮功能
                        };
                        resultsDiv.appendChild(div);
                    });
                } else {
                    resultsDiv.innerHTML = '<div style="padding: 10px;">未找到匹配的注释</div>';
                }
                resultsDiv.style.display = 'block';
            } catch (error) {
                console.error('Error fetching annotations:', error);
                resultsDiv.innerHTML = '<div style="padding: 10px; color: red;">加载注释时出错</div>';
                resultsDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
