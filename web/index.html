<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF Mirador Viewer with Annotations</title>
    
    <!-- Mirador -->
    <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/mirador.min.css">
    <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
    
    <style>
        #viewer {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="text/javascript">
        var mirador = Mirador.viewer({
            id: "viewer",
            windows: [{
                manifestId: 'https://oushiei120.github.io/iiif/manifests/manifest.json',
                allowClose: true,
                allowFullscreen: true,
                allowMaximize: true,
                defaultView: 'single',
                sideBarsOpen: true,
                annotations: true
            }],
            window: {
                allowClose: true,
                allowFullscreen: true,
                allowMaximize: true,
                sideBarOpen: true,
                sideBarPanel: 'annotations',
                views: [
                    { key: 'single' },
                    { key: 'book' },
                    { key: 'gallery' }
                ],
            },
            workspace: {
                type: 'mosaic',
                showZoomControls: true,
            },
            workspaceControlPanel: {
                enabled: true,
            },
            annotation: {
                adapter: (canvasId) => ({
                    id: 'iiifAnnotationAdapter',
                    annotationPageId: `https://oushiei120.github.io/iiif/annotations/page${canvasId.match(/p(\d+)$/)[1]}/list.json`,
                    annotationPageBody: async () => {
                        try {
                            const response = await fetch(`https://oushiei120.github.io/iiif/annotations/page${canvasId.match(/p(\d+)$/)[1]}/list.json`);
                            const data = await response.json();
                            return data;
                        } catch (error) {
                            console.error('Error loading annotations:', error);
                            return { resources: [] };
                        }
                    }
                })
            }
        });
    </script>
</body>
</html>
